<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Temple Fortune</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Cinzel:wght@400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cinzel', 'Noto Serif SC', serif;
    background: transparent;
    margin: 0; padding: 0;
  }

  #game {
    width: 480px; height: 720px;
    position: relative; overflow: hidden;
    border-radius: 4px;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }

  /* ── Temple photo background ── */
  .bg-photo {
    position: absolute; inset: 0; z-index: 0;
    background-image: url('https://upload.wikimedia.org/wikipedia/commons/thumb/3/3e/Shaolin_Temple_15328-Dengfeng_%2848757381678%29.jpg/960px-Shaolin_Temple_15328-Dengfeng_%2848757381678%29.jpg');
    background-size: cover;
    background-position: center top;
    filter: sepia(60%) saturate(60%) brightness(0.72);
  }
  /* Warm overlay using palette colors */
  .bg-overlay {
    position: absolute; inset: 0; z-index: 1;
    background: linear-gradient(
      180deg,
      rgba(232,216,194,0.35) 0%,
      rgba(184,160,137,0.25) 40%,
      rgba(215,198,181,0.45) 75%,
      rgba(244,239,227,0.65) 100%
    );
  }

  /* Decorative border */
  .border-frame {
    position: absolute; inset: 10px;
    border: 1.5px solid #B8A089;
    border-radius: 2px;
    pointer-events: none; z-index: 100;
    box-shadow: inset 0 0 30px rgba(184,160,137,0.15);
  }
  .border-frame::before {
    content: '';
    position: absolute; inset: 5px;
    border: 1px solid rgba(184,160,137,0.4);
    border-radius: 1px;
  }

  /* Corner ornaments */
  .corner { position: absolute; width: 26px; height: 26px; z-index: 101; }
  .corner svg { width: 100%; height: 100%; }
  .corner.tl { top: 16px; left: 16px; }
  .corner.tr { top: 16px; right: 16px; transform: scaleX(-1); }
  .corner.bl { bottom: 16px; left: 16px; transform: scaleY(-1); }
  .corner.br { bottom: 16px; right: 16px; transform: scale(-1,-1); }

  /* ── Screens ── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.6s ease;
    z-index: 10;
  }
  .screen.active { opacity: 1; pointer-events: all; }

  /* ── Screen 1: Welcome ── */
  #s1 .title-wrap { text-align: center; margin-bottom: 44px; }
  #s1 h1 {
    font-size: 30px; color: #fff;
    letter-spacing: 5px; line-height: 1.5;
    font-family: 'Cinzel', serif;
    font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }
  #s1 .subtitle {
    color: #fff; font-size: 12px;
    letter-spacing: 4px; margin-top: 10px;
    font-family: 'Cinzel', serif;
    text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  }

  .btn-fortune {
    background: linear-gradient(135deg, #B8A089 0%, #D7C6B5 50%, #B8A089 100%);
    color: #1a0e05;
    font-family: 'Cinzel', serif;
    font-size: 14px; letter-spacing: 4px;
    padding: 14px 42px; border: none; cursor: pointer;
    border-radius: 2px;
    border: 1px solid rgba(232,216,194,0.6);
    box-shadow: 0 4px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(244,239,227,0.4);
    transition: all 0.3s;
    text-transform: uppercase;
  }
  .btn-fortune:hover {
    background: linear-gradient(135deg, #D7C6B5 0%, #E8D8C2 50%, #D7C6B5 100%);
    box-shadow: 0 6px 28px rgba(0,0,0,0.5);
    transform: translateY(-2px);
  }

  /* ── Screen 2: Choose category ── */
  #s2 { padding: 30px 20px; }
  #s2 .prompt {
    color: #000; font-size: 13px; letter-spacing: 3px;
    margin-bottom: 34px; text-align: center;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    text-shadow: none;
  }
  .slips-row {
    display: flex; gap: 26px; align-items: flex-start; justify-content: center;
  }
  .slip-wrap { display: flex; flex-direction: column; align-items: center; cursor: pointer; }
  .slip-label {
    color: #000; font-size: 10px; letter-spacing: 3px;
    margin-bottom: 10px; text-align: center;
    font-family: 'Cinzel', serif; text-transform: uppercase;
    font-weight: 700;
    text-shadow: none;
    height: 16px; line-height: 16px;
  }
  .slip {
    width: 80px; height: 220px;
    transition: transform 0.3s, filter 0.3s;
    transform-origin: bottom center;
  }
  .slip:hover { transform: translateY(-14px) rotate(-2deg); filter: brightness(1.15); }
  .slip svg { width: 100%; height: 100%; }
  .bamboo-stick {
    width: 6px; height: 60px;
    background: linear-gradient(180deg, #B8A089 0%, #D7C6B5 50%, #B8A089 100%);
    border-radius: 3px; margin-top: 2px;
    box-shadow: 1px 0 3px rgba(0,0,0,0.3);
  }

  /* ── Screen 3: Shake ── */
  #s3 { justify-content: center; padding-top: 0; }
  #s3 .prompt-top {
    color: #000; font-size: 13px; letter-spacing: 3px;
    text-align: center; margin-bottom: 40px;
    font-family: 'Cinzel', serif;
    font-weight: 600;
    text-shadow: none;
  }
  .canister-wrap {
    display: flex; flex-direction: column; align-items: center;
    cursor: pointer;
  }
  .canister { transition: transform 0.1s; }
  .canister.shake { animation: shake 0.5s ease; }
  @keyframes shake {
    0%,100% { transform: rotate(0deg) translateX(0); }
    15% { transform: rotate(-8deg) translateX(-6px); }
    30% { transform: rotate(8deg) translateX(6px); }
    45% { transform: rotate(-6deg) translateX(-4px); }
    60% { transform: rotate(6deg) translateX(4px); }
    75% { transform: rotate(-3deg) translateX(-2px); }
    90% { transform: rotate(3deg) translateX(2px); }
  }

  /* ── Screen 4: Result ── */
  #s4 { padding: 20px; }
  #s4 .topic-label {
    color: #000; font-size: 11px; letter-spacing: 4px;
    margin-bottom: 18px; text-align: center;
    font-family: 'Cinzel', serif; text-transform: uppercase;
    font-weight: 700;
    text-shadow: none;
  }
  .result-paper {
    width: 310px;
    background: linear-gradient(170deg, #F4EFE3 0%, #E8D8C2 40%, #D7C6B5 100%);
    border-radius: 3px;
    padding: 28px 26px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 0 30px rgba(184,160,137,0.1);
    border: 1px solid rgba(184,160,137,0.5);
    text-align: center;
    opacity: 0; transform: scale(0.85);
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  .result-paper.show { opacity: 1; transform: scale(1); }
  .result-paper::before {
    content: '';
    position: absolute; inset: 7px;
    border: 1px solid rgba(184,160,137,0.3);
    border-radius: 2px; pointer-events: none;
  }
  .paper-divider {
    width: 80%; height: 1px; margin: 0 auto 16px;
    background: linear-gradient(90deg, transparent, #B8A089, transparent);
  }
  .paper-poem {
    font-size: 14px; color: #000; line-height: 2.2;
    letter-spacing: 2px; font-weight: 600;
    font-family: 'Cinzel', serif;
  }
  .paper-interp {
    font-size: 11px; color: rgba(0,0,0,0.6); margin-top: 14px;
    letter-spacing: 1px; line-height: 1.8;
    font-style: italic;
    font-family: Georgia, serif;
  }
  .paper-corner-dot {
    position: absolute; width: 7px; height: 7px;
    border-radius: 50%; background: rgba(184,160,137,0.5);
  }
  .paper-corner-dot.tl { top: 12px; left: 12px; }
  .paper-corner-dot.tr { top: 12px; right: 12px; }
  .paper-corner-dot.bl { bottom: 12px; left: 12px; }
  .paper-corner-dot.br { bottom: 12px; right: 12px; }

  .btn-row { margin-top: 24px; display: flex; gap: 16px; z-index: 2; position: relative; }
  .btn-sm {
    background: linear-gradient(135deg, #B8A089 0%, #D7C6B5 100%);
    color: #000; font-family: 'Cinzel', serif; font-size: 11px;
    letter-spacing: 3px; padding: 10px 22px;
    border: 1px solid rgba(184,160,137,0.6); border-radius: 2px;
    cursor: pointer; transition: all 0.3s;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    text-transform: uppercase;
  }
  .btn-sm:hover { background: linear-gradient(135deg, #D7C6B5 0%, #E8D8C2 100%); transform: translateY(-1px); }

  /* Lanterns */
  .lantern-l, .lantern-r {
    position: absolute; z-index: 1;
    animation: sway 4s ease-in-out infinite;
    transform-origin: top center;
  }
  .lantern-r { animation-delay: -2s; }
  @keyframes sway {
    0%,100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
</style>
</head>
<body>
<div id="game">
  <!-- Photo background -->
  <div class="bg-photo"></div>
  <div class="bg-overlay"></div>

  <!-- Border decoration -->
  <div class="border-frame"></div>
  <div class="corner tl"><svg viewBox="0 0 24 24"><path d="M2,22 L2,2 L22,2" stroke="#D7C6B5" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#D7C6B5"/></svg></div>
  <div class="corner tr"><svg viewBox="0 0 24 24"><path d="M2,22 L2,2 L22,2" stroke="#D7C6B5" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#D7C6B5"/></svg></div>
  <div class="corner bl"><svg viewBox="0 0 24 24"><path d="M2,22 L2,2 L22,2" stroke="#D7C6B5" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#D7C6B5"/></svg></div>
  <div class="corner br"><svg viewBox="0 0 24 24"><path d="M2,22 L2,2 L22,2" stroke="#D7C6B5" stroke-width="1.5" fill="none"/><circle cx="2" cy="2" r="2" fill="#D7C6B5"/></svg></div>

  <!-- SCREEN 1: Welcome -->
  <div id="s1" class="screen active">
    <div class="title-wrap">
      <h1>Temple Fortune</h1>
      <div class="subtitle">— Seek wisdom, find your path —</div>
    </div>
    <button class="btn-fortune" onclick="goTo(2)">✦ Draw Fortune ✦</button>
  </div>

  <!-- SCREEN 2: Choose category -->
  <div id="s2" class="screen">
    <div class="prompt" style="position:relative;z-index:2">Choose a scroll · seek your fortune</div>
    <div class="slips-row">
      <!-- Love -->
      <div class="slip-wrap" onclick="choose('love')">
        <div class="slip-label">Love</div>
        <div class="slip">
          <svg viewBox="0 0 80 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="slipLove" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#F4EFE3"/>
                <stop offset="100%" stop-color="#D7C6B5"/>
              </linearGradient>
            </defs>
            <rect x="4" y="8" width="72" height="204" rx="3" fill="url(#slipLove)" stroke="#B8A089" stroke-width="1.2"/>
            <rect x="9" y="13" width="62" height="194" rx="2" fill="none" stroke="rgba(184,160,137,0.35)" stroke-width="0.8"/>
            <g transform="translate(40,32)" fill="none" stroke="#B8A089" stroke-width="1">
              <ellipse cx="0" cy="0" rx="8" ry="5" transform="rotate(-30)"/>
              <ellipse cx="0" cy="0" rx="8" ry="5" transform="rotate(30)"/>
              <ellipse cx="0" cy="0" rx="8" ry="5" transform="rotate(90)"/>
              <circle cx="0" cy="0" r="3" fill="#B8A089" opacity="0.5"/>
            </g>
            <g transform="translate(40,192)" fill="#B8A089" opacity="0.5">
              <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2"/>
            </g>
            <line x1="14" y1="13" x2="14" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <line x1="66" y1="13" x2="66" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <text x="40" y="70" text-anchor="middle" font-family="Cinzel, serif" font-size="10" fill="#3d2810" letter-spacing="2">
              <tspan x="40" dy="0">L</tspan>
              <tspan x="40" dy="16">O</tspan>
              <tspan x="40" dy="16">V</tspan>
              <tspan x="40" dy="16">E</tspan>
            </text>
            <path d="M20,165 Q25,158 30,165 Q35,172 40,165 Q45,158 50,165 Q55,172 60,165" stroke="#B8A089" stroke-width="0.8" fill="none" opacity="0.6"/>
          </svg>
        </div>
        <div class="bamboo-stick"></div>
      </div>

      <!-- Career -->
      <div class="slip-wrap" onclick="choose('career')">
        <div class="slip-label">Career</div>
        <div class="slip">
          <svg viewBox="0 0 80 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="slipCareer" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#F4EFE3"/>
                <stop offset="100%" stop-color="#D7C6B5"/>
              </linearGradient>
            </defs>
            <rect x="4" y="8" width="72" height="204" rx="3" fill="url(#slipCareer)" stroke="#B8A089" stroke-width="1.2"/>
            <rect x="9" y="13" width="62" height="194" rx="2" fill="none" stroke="rgba(184,160,137,0.35)" stroke-width="0.8"/>
            <g transform="translate(40,30)">
              <circle cx="0" cy="0" r="10" fill="none" stroke="#B8A089" stroke-width="1.2"/>
              <circle cx="0" cy="0" r="3" fill="#B8A089" opacity="0.6"/>
              <line x1="-10" y1="0" x2="10" y2="0" stroke="#B8A089" stroke-width="0.8"/>
              <line x1="0" y1="-10" x2="0" y2="10" stroke="#B8A089" stroke-width="0.8"/>
              <line x1="-7" y1="-7" x2="7" y2="7" stroke="#B8A089" stroke-width="0.6"/>
              <line x1="7" y1="-7" x2="-7" y2="7" stroke="#B8A089" stroke-width="0.6"/>
            </g>
            <g transform="translate(40,192)" fill="#B8A089" opacity="0.5">
              <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2"/>
            </g>
            <line x1="14" y1="13" x2="14" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <line x1="66" y1="13" x2="66" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <text x="40" y="70" text-anchor="middle" font-family="Cinzel, serif" font-size="9" fill="#3d2810" letter-spacing="1">
              <tspan x="40" dy="0">C</tspan>
              <tspan x="40" dy="15">A</tspan>
              <tspan x="40" dy="15">R</tspan>
              <tspan x="40" dy="15">E</tspan>
              <tspan x="40" dy="15">E</tspan>
              <tspan x="40" dy="15">R</tspan>
            </text>
            <path d="M20,165 Q25,158 30,165 Q35,172 40,165 Q45,158 50,165 Q55,172 60,165" stroke="#B8A089" stroke-width="0.8" fill="none" opacity="0.6"/>
          </svg>
        </div>
        <div class="bamboo-stick"></div>
      </div>

      <!-- Wealth -->
      <div class="slip-wrap" onclick="choose('wealth')">
        <div class="slip-label">Wealth</div>
        <div class="slip">
          <svg viewBox="0 0 80 220" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="slipWealth" x1="0%" y1="0%" x2="0%" y2="100%">
                <stop offset="0%" stop-color="#F4EFE3"/>
                <stop offset="100%" stop-color="#D7C6B5"/>
              </linearGradient>
            </defs>
            <rect x="4" y="8" width="72" height="204" rx="3" fill="url(#slipWealth)" stroke="#B8A089" stroke-width="1.2"/>
            <rect x="9" y="13" width="62" height="194" rx="2" fill="none" stroke="rgba(184,160,137,0.35)" stroke-width="0.8"/>
            <circle cx="40" cy="30" r="12" fill="none" stroke="#B8A089" stroke-width="1.5"/>
            <rect x="36" y="26" width="8" height="8" fill="none" stroke="#B8A089" stroke-width="1"/>
            <circle cx="40" cy="30" r="6" fill="rgba(184,160,137,0.15)"/>
            <g transform="translate(40,192)" fill="#B8A089" opacity="0.5">
              <polygon points="0,-6 2,-2 6,-2 3,1 4,5 0,3 -4,5 -3,1 -6,-2 -2,-2"/>
            </g>
            <line x1="14" y1="13" x2="14" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <line x1="66" y1="13" x2="66" y2="207" stroke="rgba(184,160,137,0.25)" stroke-width="0.6" stroke-dasharray="4,4"/>
            <text x="40" y="70" text-anchor="middle" font-family="Cinzel, serif" font-size="9" fill="#3d2810" letter-spacing="1">
              <tspan x="40" dy="0">W</tspan>
              <tspan x="40" dy="15">E</tspan>
              <tspan x="40" dy="15">A</tspan>
              <tspan x="40" dy="15">L</tspan>
              <tspan x="40" dy="15">T</tspan>
              <tspan x="40" dy="15">H</tspan>
            </text>
            <path d="M20,165 Q25,158 30,165 Q35,172 40,165 Q45,158 50,165 Q55,172 60,165" stroke="#B8A089" stroke-width="0.8" fill="none" opacity="0.6"/>
          </svg>
        </div>
        <div class="bamboo-stick"></div>
      </div>
    </div>
  </div>

  <!-- SCREEN 3: Shake canister -->
  <div id="s3" class="screen">
    <div class="prompt-top" id="s3prompt">Double-tap the canister<br>· release your fortune ·</div>
    <div class="canister-wrap" id="canisterWrap" ondblclick="shakeCanister()">
      <svg id="canisterSvg" class="canister" width="180" height="280" viewBox="0 0 180 280">
        <defs>
          <linearGradient id="canGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#B8A089"/>
            <stop offset="30%" stop-color="#D7C6B5"/>
            <stop offset="50%" stop-color="#E8D8C2"/>
            <stop offset="70%" stop-color="#D7C6B5"/>
            <stop offset="100%" stop-color="#B8A089"/>
          </linearGradient>
          <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#B8A089"/>
            <stop offset="50%" stop-color="#F4EFE3"/>
            <stop offset="100%" stop-color="#B8A089"/>
          </linearGradient>
        </defs>

        <!-- Bamboo sticks back -->
        <g opacity="0.6">
          <rect x="72" y="18" width="5" height="90" rx="2" fill="#B8A089" transform="rotate(-8,72,100)"/>
          <rect x="80" y="15" width="5" height="95" rx="2" fill="#D7C6B5" transform="rotate(-3,80,100)"/>
          <rect x="88" y="14" width="5" height="98" rx="2" fill="#B8A089" transform="rotate(1,88,100)"/>
          <rect x="96" y="15" width="5" height="95" rx="2" fill="#D7C6B5" transform="rotate(5,96,100)"/>
          <rect x="104" y="18" width="5" height="90" rx="2" fill="#B8A089" transform="rotate(9,104,100)"/>
        </g>

        <!-- Canister body -->
        <rect x="40" y="80" width="100" height="180" rx="8" fill="url(#canGrad)"/>
        <!-- Wood grain -->
        <line x1="55" y1="80" x2="55" y2="260" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
        <line x1="70" y1="80" x2="70" y2="260" stroke="rgba(0,0,0,0.08)" stroke-width="0.8"/>
        <line x1="110" y1="80" x2="110" y2="260" stroke="rgba(0,0,0,0.08)" stroke-width="0.8"/>
        <line x1="125" y1="80" x2="125" y2="260" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
        <!-- Rim top -->
        <rect x="36" y="74" width="108" height="14" rx="4" fill="url(#rimGrad)"/>
        <rect x="38" y="75" width="104" height="4" rx="2" fill="rgba(244,239,227,0.4)"/>
        <!-- Rim bands -->
        <rect x="36" y="130" width="108" height="7" rx="2" fill="url(#rimGrad)" opacity="0.7"/>
        <rect x="36" y="190" width="108" height="7" rx="2" fill="url(#rimGrad)" opacity="0.7"/>
        <!-- Bottom -->
        <ellipse cx="90" cy="260" rx="54" ry="10" fill="rgba(0,0,0,0.2)"/>
        <rect x="36" y="252" width="108" height="10" rx="4" fill="#B8A089"/>
        <!-- Engraved pattern -->
        <g opacity="0.3" stroke="#F4EFE3" stroke-width="0.8" fill="none">
          <path d="M60,150 Q70,140 80,150 Q90,160 100,150 Q110,140 120,150"/>
          <path d="M60,170 Q70,160 80,170 Q90,180 100,170 Q110,160 120,170"/>
          <circle cx="90" cy="210" r="12"/>
          <line x1="90" y1="198" x2="90" y2="222"/>
          <line x1="78" y1="210" x2="102" y2="210"/>
        </g>

        <!-- Sticks top protruding -->
        <g id="sticksTop">
          <rect x="69" y="10" width="5" height="72" rx="2" fill="#D7C6B5" transform="rotate(-8,69,88)"/>
          <rect x="77" y="8" width="5" height="70" rx="2" fill="#E8D8C2" transform="rotate(-3,77,88)"/>
          <rect x="85" y="7" width="5" height="73" rx="2" fill="#D7C6B5" transform="rotate(1,85,88)"/>
          <rect x="93" y="8" width="5" height="70" rx="2" fill="#E8D8C2" transform="rotate(5,93,88)"/>
          <rect x="101" y="10" width="5" height="68" rx="2" fill="#D7C6B5" transform="rotate(9,101,88)"/>
        </g>

        <!-- Flying stick (hidden initially) -->
        <g id="flyStick" opacity="0" transform="translate(87,80)">
          <rect x="-2.5" y="-80" width="5" height="80" rx="2" fill="#E8D8C2"/>
          <rect x="-2.5" y="-82" width="5" height="4" rx="1" fill="#F4EFE3"/>
        </g>
      </svg>
    </div>

    <button id="btnReveal" class="btn-sm" style="margin-top:40px;display:none" onclick="goTo(4)">Reveal Fortune</button>
  </div>

  <!-- SCREEN 4: Result -->
  <div id="s4" class="screen">
    <div class="topic-label" id="topicLabel">— Career —</div>
    <div class="result-paper" id="resultPaper">
      <div class="paper-corner-dot tl"></div>
      <div class="paper-corner-dot tr"></div>
      <div class="paper-corner-dot bl"></div>
      <div class="paper-corner-dot br"></div>
      <div class="paper-divider"></div>
      <div class="paper-poem" id="paperPoem">Loading...</div>
      <div class="paper-interp" id="paperInterp">Interpretation...</div>
    </div>
    <div class="btn-row">
      <button class="btn-sm" onclick="drawAgain()">Draw Again</button>
      <button class="btn-sm" onclick="goTo(2)">Change Topic</button>
    </div>
  </div>
</div><!-- end #game -->

<script>
const FORTUNES = {
  love: [
    {
      poem: "The mirror holds no dust,\nThe still lake reflects the heart.",
      interp: "What you seek is already near — quiet your mind and the answer surfaces naturally."
    },
    {
      poem: "Spring clouds part slowly;\nSunlight finds its way through.",
      interp: "A slow beginning does not mean no beginning. Patience reveals what haste conceals."
    },
    {
      poem: "The plum blooms in snow,\nIts fragrance reaches farther.",
      interp: "True affection is tested by adversity — what survives hardship is precious and rare."
    },
    {
      poem: "One thread, ten thousand li;\nThe knot ties itself in time.",
      interp: "Do not force what has not yet ripened. What is fated will arrive — trust the timing."
    },
    {
      poem: "Tide comes, tide retreats;\nOnly the shore remains faithful.",
      interp: "Consistency outlasts passion. Seek the one who stays, not the one who dazzles."
    },
    {
      poem: "The old pine stands in wind;\nSeeds fall where they may.",
      interp: "Release attachment to outcome. Plant sincerity and let nature decide the harvest."
    }
  ],
  career: [
    {
      poem: "Food and clothing come naturally;\nNo need for weary toil.",
      interp: "Align with your strengths — when work matches nature, effort becomes effortless."
    },
    {
      poem: "A thousand-li journey;\nBegins with the ground beneath your feet.",
      interp: "Do not despise small beginnings. Each steady step compounds into greatness."
    },
    {
      poem: "The tall tree stands apart;\nWind tests it, roots hold firm.",
      interp: "Visibility invites scrutiny — build deep foundations before seeking height."
    },
    {
      poem: "After the tide, the shore clears;\nThe net fills at dawn.",
      interp: "A difficult period is ending. Act after the storm passes — timing is everything."
    },
    {
      poem: "Bamboo and pine flourish together;\nGrowth shelters growth.",
      interp: "Your next advance comes through collaboration, not competition. Share the light."
    },
    {
      poem: "Still water does not shout;\nYet the valley fills in time.",
      interp: "Let results speak. Quiet diligence accumulates where noise only dissipates."
    }
  ],
  wealth: [
    {
      poem: "Water seeks the low place;\nHarvest awaits the patient hand.",
      interp: "Wealth flows to those who prepare space for it — clear obstacles, not pathways."
    },
    {
      poem: "One day, one gathering;\nSmall pools become deep rivers.",
      interp: "Accumulation over time outpaces any single windfall. Trust the steady drip."
    },
    {
      poem: "Autumn grain awaits no wind;\nGold hides deep in the mountain.",
      interp: "The opportunity is real but not yet visible. Hold position — do not sell early."
    },
    {
      poem: "A warm boat on still water;\nThe net spreads wide at ease.",
      interp: "Calm conditions favor bold moves. This is a window — open it while it lasts."
    },
    {
      poem: "Scatter to gather;\nThe pearl waits within the shell.",
      interp: "Giving creates flow. Generosity now returns multiplied — do not hoard the seed."
    },
    {
      poem: "Deep roots, wide canopy;\nFruit appears without forcing.",
      interp: "Stop chasing the harvest — tend the roots. Abundance is already growing unseen."
    }
  ]
};

let currentTopic = 'career';
let shaken = false;
let lastFortuneIdx = -1;

function goTo(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('s' + n).classList.add('active');
  if (n === 3) resetShake();
  if (n === 4) showResult();
}

function choose(topic) {
  currentTopic = topic;
  const labels = { love: 'Love', career: 'Career', wealth: 'Wealth' };
  document.getElementById('topicLabel').textContent = '— ' + labels[topic] + ' —';
  goTo(3);
}

function resetShake() {
  shaken = false;
  document.getElementById('s3prompt').innerHTML = 'Double-tap the canister<br>· release your fortune ·';
  document.getElementById('btnReveal').style.display = 'none';
  const fly = document.getElementById('flyStick');
  fly.setAttribute('opacity', '0');
  fly.setAttribute('transform', 'translate(87,80)');
}

function shakeCanister() {
  if (shaken) return;
  const svg = document.getElementById('canisterSvg');
  svg.classList.add('shake');
  setTimeout(() => svg.classList.remove('shake'), 600);

  const fly = document.getElementById('flyStick');
  fly.setAttribute('opacity', '1');
  let progress = 0;
  const anim = setInterval(() => {
    progress += 0.05;
    const y = -80 * Math.min(progress * 2, 1);
    const rot = -15 + 30 * Math.min(progress, 1);
    fly.setAttribute('transform', `translate(87,80) rotate(${rot}) translate(0,${y})`);
    if (progress >= 1) clearInterval(anim);
  }, 16);

  setTimeout(() => {
    shaken = true;
    document.getElementById('s3prompt').innerHTML = 'Your lot has fallen<br>· read the omen ·';
    document.getElementById('btnReveal').style.display = 'inline-block';
  }, 700);
}

function showResult() {
  const fortunes = FORTUNES[currentTopic];
  let idx;
  do { idx = Math.floor(Math.random() * fortunes.length); } while (idx === lastFortuneIdx && fortunes.length > 1);
  lastFortuneIdx = idx;
  const f = fortunes[idx];

  document.getElementById('paperPoem').innerHTML = f.poem.replace(/\n/g, '<br>');
  document.getElementById('paperInterp').textContent = f.interp;

  const paper = document.getElementById('resultPaper');
  paper.classList.remove('show');
  setTimeout(() => paper.classList.add('show'), 80);
}

function drawAgain() { goTo(3); }
</script>
</body>
</html>
